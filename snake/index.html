<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; color: #eee; }
  canvas { border: 2px solid #e94560; border-radius: 4px; background: #16213e; }
  #score { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 2px; }
  #msg { margin-top: 14px; font-size: 1rem; opacity: 0.7; min-height: 1.4em; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="msg">Arrow keys or WASD to move</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const SIZE = 20;
const COLS = canvas.width / SIZE;
const ROWS = canvas.height / SIZE;

let snake, dir, nextDir, food, score, speed, loop, running;

function init() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 120;
  running = true;
  placeFood();
  updateScore();
  document.getElementById('msg').textContent = 'Arrow keys or WASD to move';
  if (loop) clearInterval(loop);
  loop = setInterval(tick, speed);
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS)};
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function updateScore() {
  document.getElementById('score').textContent = 'Score: ' + score;
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(loop);
    running = false;
    document.getElementById('msg').textContent = 'Game Over! Press Space to restart';
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
    if (speed > 60) {
      speed -= 3;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#e94560' : '#0f3460';
    ctx.fillRect(s.x * SIZE + 1, s.y * SIZE + 1, SIZE - 2, SIZE - 2);
  });

  ctx.fillStyle = '#e9e916';
  ctx.fillRect(food.x * SIZE + 1, food.y * SIZE + 1, SIZE - 2, SIZE - 2);
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if ((key === 'arrowup' || key === 'w') && dir.y === 0) nextDir = {x: 0, y: -1};
  else if ((key === 'arrowdown' || key === 's') && dir.y === 0) nextDir = {x: 0, y: 1};
  else if ((key === 'arrowleft' || key === 'a') && dir.x === 0) nextDir = {x: -1, y: 0};
  else if ((key === 'arrowright' || key === 'd') && dir.x === 0) nextDir = {x: 1, y: 0};
  else if (key === ' ' && !running) init();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(key)) e.preventDefault();
});

init();
draw();
</script>
</body>
</html>
